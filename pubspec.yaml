name: resqnet
description: ResqNet - Production Grade Disaster Response App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  google_maps_flutter: ^2.17.0
  google_maps_flutter_web: ^0.6.2
  http: ^1.6.0
  firebase_core: ^3.13.0
  google_mlkit_object_detection: ^0.15.1
  google_mlkit_translation: ^0.13.0
  google_mlkit_image_labeling: ^0.14.2
  cloud_firestore: ^5.6.12
  google_generative_ai: ^0.4.6
  camera: ^0.11.1
  image_picker: ^1.1.2
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.2
  permission_handler: ^12.0.1
  firebase_auth: ^5.7.0
  sqflite: ^2.4.2+1
  path_provider: ^2.1.5
  connectivity_plus: ^7.1.1
  nearby_connections: ^4.3.0
  flutter_dotenv: ^6.0.1
  cryptography: ^2.9.0
  uuid: ^4.5.3
  shared_preferences: ^2.5.5
  path: ^1.9.0
  webview_flutter_web: ^0.2.3
  webview_flutter_android: ^4.3.0
  webview_flutter_wkwebview: ^3.16.0
  webview_flutter_platform_interface: ^2.10.0
  geolocator: ^13.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/echo_logo.png"
  min_sdk_android: 21 # android min sdk min:16, default:21

flutter:
  uses-material-design: true
  assets:
    - assets/.env
    - assets/images/
